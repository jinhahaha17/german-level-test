<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>독일어 레벨 테스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1rem 1rem 3rem;
    }

    .container { width: 100%; max-width: 640px; margin: 0 auto; }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ───── START SCREEN ───── */
    .start-card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      margin-top: 2rem;
      text-align: center;
    }

    .flag { font-size: 4rem; margin-bottom: 1rem; display: block; }

    .start-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 0.4rem;
    }

    .start-card .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 1.25rem; }

    .level-range {
      display: inline-flex;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge-sm {
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      color: white;
    }
    .badge-a1 { background: #3b82f6; }
    .badge-a2 { background: #10b981; }
    .badge-b1 { background: #6366f1; }
    .badge-b2 { background: #a855f7; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .info-item {
      background: #f8fafc;
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
    }
    .info-item .num {
      font-size: 1.4rem;
      font-weight: 800;
      color: #3b82f6;
      display: block;
    }
    .info-item .lbl { font-size: 0.78rem; color: #94a3b8; margin-top: 0.2rem; }

    /* ───── BUTTONS ───── */
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1rem 2rem;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(99,102,241,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ───── TEST SCREEN ───── */
    .progress-wrap { margin-top: 1.25rem; }

    .progress-bar-bg {
      height: 7px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 0.45rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      text-align: right;
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    .question-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .q-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .q-num { font-size: 0.8rem; color: #94a3b8; font-weight: 700; }

    .domain-tag {
      font-size: 0.74rem;
      padding: 0.18rem 0.65rem;
      border-radius: 20px;
      font-weight: 700;
    }
    .tag-vocab { background: #dbeafe; color: #1d4ed8; }
    .tag-grammar { background: #f3e8ff; color: #7c3aed; }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .options { display: flex; flex-direction: column; gap: 0.7rem; }

    .option-btn {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 0.875rem 1rem;
      text-align: left;
      cursor: pointer;
      font-size: 0.98rem;
      color: #334155;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }
    .option-btn:hover { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
    .option-btn.selected { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }

    .opt-letter {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .option-btn.selected .opt-letter { background: #3b82f6; color: white; }

    .next-wrap { margin-top: 1.5rem; }

    /* ───── RESULT SCREEN ───── */
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-top: 1.25rem;
      margin-bottom: 1rem;
    }

    .result-header { text-align: center; margin-bottom: 2rem; }

    .level-badge-lg {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      font-size: 2.2rem;
      font-weight: 900;
      color: white;
      margin-bottom: 1rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    }

    .result-header h2 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; }
    .result-header p { color: #64748b; font-size: 0.88rem; line-height: 1.7; }

    .score-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1.75rem;
    }
    .score-card { background: #f8fafc; border-radius: 12px; padding: 1rem 0.5rem; text-align: center; }
    .score-card .sc-val { font-size: 1.35rem; font-weight: 800; color: #3b82f6; }
    .score-card .sc-lbl { font-size: 0.72rem; color: #94a3b8; margin-top: 0.2rem; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .domain-bars { margin-bottom: 1.75rem; }
    .domain-row { margin-bottom: 0.9rem; }
    .domain-row-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.84rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.35rem;
    }
    .bar-bg { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }
    .bar-vocab { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .bar-grammar { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

    /* Level scale */
    .level-scale { margin-bottom: 1.75rem; }
    .scale-track {
      display: flex;
      border-radius: 10px;
      overflow: visible;
      height: 44px;
      position: relative;
      gap: 3px;
    }
    .scale-seg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      font-weight: 800;
      color: rgba(255,255,255,0.65);
      border-radius: 8px;
      transition: all 0.3s;
      position: relative;
    }
    .seg-a1 { background: #bfdbfe; color: #93c5fd; }
    .seg-a2 { background: #a7f3d0; color: #6ee7b7; }
    .seg-b1 { background: #c7d2fe; color: #a5b4fc; }
    .seg-b2 { background: #e9d5ff; color: #d8b4fe; }

    .scale-seg.active {
      color: white;
      transform: scaleY(1.12);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }
    .seg-a1.active { background: #3b82f6; }
    .seg-a2.active { background: #10b981; }
    .seg-b1.active { background: #6366f1; }
    .seg-b2.active { background: #a855f7; }

    .scale-seg.active::after {
      content: '현재';
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      font-weight: 700;
      color: #475569;
      white-space: nowrap;
    }
    .scale-spacer { height: 28px; }

    /* CTA */
    .btn-cta {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 1.05rem 2rem;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 16px rgba(239,68,68,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(239,68,68,0.45); }

    .retry-link {
      display: block;
      text-align: center;
      color: #94a3b8;
      font-size: 0.88rem;
      cursor: pointer;
      padding: 0.5rem;
      text-decoration: underline;
      transition: color 0.15s;
    }
    .retry-link:hover { color: #64748b; }

    @media (max-width: 400px) {
      .score-cards { grid-template-columns: 1fr 1fr; }
      .start-card, .question-card, .result-card { padding: 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ══════════════════ SCREEN 1: START ══════════════════ -->
  <div class="screen active" id="screen-start">
    <div class="start-card">
      <span class="flag">🇩🇪</span>
      <h1>독일어 레벨 테스트</h1>
      <p class="subtitle">나의 독일어 실력을 지금 바로 확인해보세요</p>

      <div class="level-range">
        <span class="badge-sm badge-a1">A1 초급</span>
        <span class="badge-sm badge-a2">A2 초급+</span>
        <span class="badge-sm badge-b1">B1 중급</span>
        <span class="badge-sm badge-b2">B2 중상급</span>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <span class="num">20</span>
          <div class="lbl">총 문항 수</div>
        </div>
        <div class="info-item">
          <span class="num">약 5분</span>
          <div class="lbl">예상 소요 시간</div>
        </div>
        <div class="info-item">
          <span class="num">어휘</span>
          <div class="lbl">Wortschatz</div>
        </div>
        <div class="info-item">
          <span class="num">문법</span>
          <div class="lbl">Grammatik</div>
        </div>
      </div>

      <button class="btn-primary" onclick="startTest()">테스트 시작하기 →</button>
    </div>
  </div>

  <!-- ══════════════════ SCREEN 2: TEST ══════════════════ -->
  <div class="screen" id="screen-test">
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label">0 / 20</div>
    </div>

    <div class="question-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">문항 1</span>
        <span class="domain-tag" id="domain-tag"></span>
      </div>
      <div class="question-text" id="question-text" lang="de"></div>
      <div class="options" id="options"></div>
      <div class="next-wrap">
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()" disabled>다음</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════ SCREEN 3: RESULT ══════════════════ -->
  <div class="screen" id="screen-result">
    <div class="result-card">
      <div class="result-header">
        <div class="level-badge-lg" id="result-badge"></div>
        <h2 id="result-title"></h2>
        <p id="result-desc"></p>
      </div>

      <div class="score-cards">
        <div class="score-card">
          <div class="sc-val" id="sc-total"></div>
          <div class="sc-lbl">총 정답</div>
        </div>
        <div class="score-card">
          <div class="sc-val" id="sc-vocab"></div>
          <div class="sc-lbl">어휘 점수</div>
        </div>
        <div class="score-card">
          <div class="sc-val" id="sc-grammar"></div>
          <div class="sc-lbl">문법 점수</div>
        </div>
      </div>

      <div class="section-title">영역별 점수</div>
      <div class="domain-bars">
        <div class="domain-row">
          <div class="domain-row-label">
            <span>어휘 (Wortschatz)</span>
            <span id="bar-vocab-pct"></span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill bar-vocab" id="bar-vocab" style="width:0%"></div>
          </div>
        </div>
        <div class="domain-row">
          <div class="domain-row-label">
            <span>문법 (Grammatik)</span>
            <span id="bar-grammar-pct"></span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill bar-grammar" id="bar-grammar" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div class="section-title">레벨 스케일</div>
      <div class="level-scale">
        <div class="scale-track">
          <div class="scale-seg seg-a1" id="scale-a1">A1</div>
          <div class="scale-seg seg-a2" id="scale-a2">A2</div>
          <div class="scale-seg seg-b1" id="scale-b1">B1</div>
          <div class="scale-seg seg-b2" id="scale-b2">B2</div>
        </div>
        <div class="scale-spacer"></div>
      </div>

      <div class="section-title">다음 단계</div>
      <a href="https://open.kakao.com/o/sOoULOnc" target="_blank" class="btn-cta">
        👩‍🏫 선생님과 1:1 상담 신청하기
      </a>
      <span class="retry-link" onclick="resetTest()">↺ 다시 풀기</span>
    </div>
  </div>

</div>
<script>
const questions = [
  /* ── A1 ─────────────────────────────────────── */
  {
    id: 1, level: "A1", domain: "vocab",
    question: "Ich ___ aus Korea.",
    options: ["komme", "kommt", "kommen", "kommst"],
    correct: 0
  },
  {
    id: 2, level: "A1", domain: "grammar",
    question: "Das ist ___ Tisch.",
    options: ["eine", "ein", "einer", "einen"],
    correct: 1
  },
  {
    id: 3, level: "A1", domain: "vocab",
    question: "Wie geht es ___?",
    options: ["Sie", "Ihr", "Ihnen", "Ihre"],
    correct: 2
  },
  {
    id: 4, level: "A1", domain: "grammar",
    question: "Ich ___ heute sehr müde.",
    options: ["bist", "ist", "sind", "bin"],
    correct: 3
  },
  {
    id: 5, level: "A1", domain: "vocab",
    question: "Entschuldigung, wo ist die ___?",
    options: ["Toiletten", "Toalett", "Toilette", "Toilett"],
    correct: 2
  },
  /* ── A2 ─────────────────────────────────────── */
  {
    id: 6, level: "A2", domain: "vocab",
    question: "Das Gegenteil von 'teuer' ist ___.",
    options: ["schwer", "billig", "schnell", "laut"],
    correct: 1
  },
  {
    id: 7, level: "A2", domain: "grammar",
    question: "Er ___ gestern ins Kino gegangen.",
    options: ["hat", "war", "hatte", "ist"],
    correct: 3
  },
  {
    id: 8, level: "A2", domain: "vocab",
    question: "Ich ___ jeden Morgen eine Tasse Kaffee.",
    options: ["esse", "trinke", "nehme", "schlucke"],
    correct: 1
  },
  {
    id: 9, level: "A2", domain: "grammar",
    question: "Er muss ___ beeilen, sonst verpasst er den Zug.",
    options: ["ihm", "ihn", "sein", "sich"],
    correct: 3
  },
  {
    id: 10, level: "A2", domain: "vocab",
    question: "Der Zug fährt um 10 Uhr ___.",
    options: ["an", "auf", "ab", "aus"],
    correct: 2
  },
  /* ── B1 ─────────────────────────────────────── */
  {
    id: 11, level: "B1", domain: "vocab",
    question: "Er hat die Prüfung erfolgreich ___.",
    options: ["gemacht", "erreicht", "beendet", "bestanden"],
    correct: 3
  },
  {
    id: 12, level: "B1", domain: "grammar",
    question: "Er arbeitet, ___ er sehr krank ist.",
    options: ["weil", "damit", "obwohl", "dass"],
    correct: 2
  },
  {
    id: 13, level: "B1", domain: "vocab",
    question: "'Heimweh' bedeutet auf Englisch ___.",
    options: ["nostalgia", "loneliness", "boredom", "homesickness"],
    correct: 3
  },
  {
    id: 14, level: "B1", domain: "grammar",
    question: "Das Buch, ___ ich gelesen habe, war sehr spannend.",
    options: ["der", "dem", "das", "dessen"],
    correct: 2
  },
  {
    id: 15, level: "B1", domain: "vocab",
    question: "Die Konferenz wurde kurzfristig ___.",
    options: ["angesagt", "abgesagt", "aufgesagt", "besagt"],
    correct: 1
  },
  /* ── B2 ─────────────────────────────────────── */
  {
    id: 16, level: "B2", domain: "vocab",
    question: "Trotz wiederholter Versuche blieb eine Einigung ___.",
    options: ["weg", "fern", "zurück", "aus"],
    correct: 3
  },
  {
    id: 17, level: "B2", domain: "grammar",
    question: "___ er früher gekommen wäre, hätten wir mehr Zeit gehabt.",
    options: ["Wenn", "Hätte", "Falls", "Wäre"],
    correct: 3
  },
  {
    id: 18, level: "B2", domain: "vocab",
    question: "Das Projekt scheiterte an mangelnder ___.",
    options: ["Finanzen", "Finanzierung", "Geldmittel", "Investition"],
    correct: 1
  },
  {
    id: 19, level: "B2", domain: "grammar",
    question: "Ich wünschte, ich ___ mehr Freizeit.",
    options: ["habe", "hatte", "gehabt", "hätte"],
    correct: 3
  },
  {
    id: 20, level: "B2", domain: "vocab",
    question: "Sie ___ den Misserfolg auf mangelnde Planung zurück.",
    options: ["setzt", "bringt", "macht", "führt"],
    correct: 3
  }
];

const levelInfo = {
  A1: {
    title: "A1 · 초급",
    desc: "일상적인 표현과 기본 문장을 이해할 수 있으며, 자신을 소개하고 간단한 의사소통이 가능한 수준입니다. 독일어 여정의 시작 단계예요!",
    color: "#3b82f6"
  },
  A2: {
    title: "A2 · 초급+",
    desc: "자주 사용되는 표현과 기본적인 정보를 이해할 수 있으며, 친숙한 상황에서 간단한 대화가 가능한 수준입니다. 기초가 잘 다져져 있어요!",
    color: "#10b981"
  },
  B1: {
    title: "B1 · 중급",
    desc: "일상적인 주제에 대해 명확하게 의사소통할 수 있고, 간단한 텍스트를 이해할 수 있는 수준입니다. 실력이 상당해요!",
    color: "#6366f1"
  },
  B2: {
    title: "B2 · 중상급",
    desc: "복잡한 텍스트의 핵심 내용을 이해하고 유창하게 의사소통할 수 있는 수준입니다. 독일어를 자유롭게 구사하는 높은 실력이에요!",
    color: "#a855f7"
  }
};

let currentQ = 0;
let userAnswers = [];
let selectedOpt = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  currentQ = 0;
  userAnswers = [];
  selectedOpt = null;
  showScreen('screen-test');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  document.getElementById('progress-fill').style.width = (currentQ / total * 100) + '%';
  document.getElementById('progress-label').textContent = currentQ + ' / ' + total;
  document.getElementById('q-num').textContent = '문항 ' + (currentQ + 1);

  const tag = document.getElementById('domain-tag');
  tag.textContent = q.domain === 'vocab' ? '어휘' : '문법';
  tag.className = 'domain-tag ' + (q.domain === 'vocab' ? 'tag-vocab' : 'tag-grammar');

  document.getElementById('question-text').textContent = q.question;

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.addEventListener('click', () => selectOption(i, btn));
    optEl.appendChild(btn);
  });

  selectedOpt = null;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.disabled = true;
  nextBtn.textContent = currentQ === total - 1 ? '결과 보기' : '다음';
}

function selectOption(idx, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOpt = idx;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (selectedOpt === null) return;
  userAnswers.push(selectedOpt);
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  const levelScores = { A1: 0, A2: 0, B1: 0, B2: 0 };
  const domainScores = { vocab: 0, grammar: 0 };
  let totalCorrect = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.correct) {
      levelScores[q.level]++;
      domainScores[q.domain]++;
      totalCorrect++;
    }
  });

  let level;
  if (levelScores.B2 >= 3) level = 'B2';
  else if (levelScores.B1 >= 3) level = 'B1';
  else if (levelScores.A2 >= 3) level = 'A2';
  else level = 'A1';

  const info = levelInfo[level];

  const badge = document.getElementById('result-badge');
  badge.textContent = level;
  badge.style.background = info.color;
  badge.style.boxShadow = `0 8px 28px ${info.color}55`;

  document.getElementById('result-title').textContent = info.title;
  document.getElementById('result-desc').textContent = info.desc;

  const vocabTotal = questions.filter(q => q.domain === 'vocab').length;
  const grammarTotal = questions.filter(q => q.domain === 'grammar').length;

  document.getElementById('sc-total').textContent = totalCorrect + ' / 20';
  document.getElementById('sc-vocab').textContent = domainScores.vocab + ' / ' + vocabTotal;
  document.getElementById('sc-grammar').textContent = domainScores.grammar + ' / ' + grammarTotal;

  const vPct = Math.round(domainScores.vocab / vocabTotal * 100);
  const gPct = Math.round(domainScores.grammar / grammarTotal * 100);
  document.getElementById('bar-vocab-pct').textContent = vPct + '%';
  document.getElementById('bar-grammar-pct').textContent = gPct + '%';

  ['A1','A2','B1','B2'].forEach(l => {
    const el = document.getElementById('scale-' + l.toLowerCase());
    el.classList.toggle('active', l === level);
  });

  showScreen('screen-result');

  setTimeout(() => {
    document.getElementById('bar-vocab').style.width = vPct + '%';
    document.getElementById('bar-grammar').style.width = gPct + '%';
  }, 120);
}

function resetTest() {
  showScreen('screen-start');
}
</script>
</body>
</html>
